name: GitHub Space Shooter Game

on:
  # Roda automaticamente todos os dias à meia-noite
  schedule:
    - cron: "0 0 * * *"
  # Permite que você rode manualmente para testar
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-gh-space-shooter-animation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate Space Shooter Animation
        # Usa a ferramenta do criador para ler seu perfil e gerar o jogo
        uses: czl9707/gh-space-shooter@master
        with:
          username: ${{ github.repository_owner }}

      - name: Push results to your repository
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
