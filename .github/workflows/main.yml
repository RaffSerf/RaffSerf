name: GitHub Space Shooter Game

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

# Disponibiliza o token globalmente para o script não dar erro
env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: generate-gh-space-shooter-animation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Generate Space Shooter Animation
        uses: czl9707/gh-space-shooter@main
        with:
          username: ${{ github.repository_owner }}

      - name: Push results to your repository
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
